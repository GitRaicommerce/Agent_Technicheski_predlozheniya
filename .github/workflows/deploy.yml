name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          request_pty: true
          script: powershell -ExecutionPolicy Bypass -File "C:\Users\Admin\Desktop\Agent_Technicheski_predlozheniya-main\scripts\deploy.ps1"
