services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tpai}
      POSTGRES_USER: ${POSTGRES_USER:-tpai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tpai_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tpai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tpai}:${POSTGRES_PASSWORD:-tpai_dev}@postgres:5432/${POSTGRES_DB:-tpai}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001"]'
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tpai}:${POSTGRES_PASSWORD:-tpai_dev}@postgres:5432/${POSTGRES_DB:-tpai}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001"]'
    volumes:
      - ./services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: rq worker --url redis://redis:6379/0 ingest

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      WATCHPACK_POLLING: "true"
    depends_on:
      - api
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  minio_data:
  web_node_modules:
